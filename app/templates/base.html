<!DOCTYPE html>
<html lang="{{ locale|default('pl') }}" id="html-root">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ t('app.name') }}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* ── Theme system ────────────────────────────────────────── */
      :root {
        color-scheme: dark;
      }
      
      html.light-mode {
        color-scheme: light;
      }

      /* ── Dark mode (default) ─────────────────────────────────── */
      body {
        background: linear-gradient(135deg, #0f0c29 0%, #1e1553 25%, #2d2463 50%, #1a2a6c 75%, #0d1b4b 100%) fixed;
        background-attachment: fixed;
        min-height: 100vh;
        transition: background 0.3s, color 0.3s;
      }

      html.light-mode body {
        background: linear-gradient(135deg, #f8f7ff 0%, #f3f0ff 25%, #ede9fe 50%, #e0e7ff 75%, #dbeafe 100%) fixed;
        background-attachment: fixed;
      }

      /* ── Glass panel ──────────────────────────────────────────────── */
      .glass {
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.16);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.16);
        transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
      }

      html.light-mode .glass {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(99, 102, 241, 0.2);
        box-shadow: 0 8px 32px rgba(99, 102, 241, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.95);
      }

      /* ── Glass input / select / textarea ─────────────────────── */
      .glass-input {
        display: block;
        width: 100%;
        padding: 0.5rem 0.75rem;
        font-size: 0.875rem;
        line-height: 1.5;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 0.75rem;
        color: white;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.3s, color 0.3s;
      }

      html.light-mode .glass-input {
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(99, 102, 241, 0.25);
        color: #1e3a8a;
      }

      .glass-input::placeholder { color: rgba(255, 255, 255, 0.35); }
      html.light-mode .glass-input::placeholder { color: rgba(99, 102, 241, 0.4); }

      .glass-input:focus {
        outline: none;
        border-color: rgba(139, 92, 246, 0.65);
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.18);
      }

      select.glass-input option { background: #1e1b4b; color: white; }
      html.light-mode select.glass-input option { background: white; color: #1e3a8a; }

      /* ── Buttons ──────────────────────────────────────────── */
      .glass-btn-primary {
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.82) 0%, rgba(139, 92, 246, 0.82) 100%);
        color: white;
        border: 1px solid rgba(139, 92, 246, 0.42);
        transition: filter 0.18s, transform 0.1s;
        cursor: pointer;
      }

      html.light-mode .glass-btn-primary {
        background: linear-gradient(135deg, rgb(99, 102, 241) 0%, rgb(139, 92, 246) 100%);
        border: 1px solid rgba(99, 102, 241, 0.35);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
      }

      .glass-btn-primary:hover { filter: brightness(1.18); }
      .glass-btn-primary:active { transform: scale(0.98); }
      .glass-btn-primary:disabled { opacity: 0.48; cursor: not-allowed; }

      .glass-btn-secondary {
        background: rgba(255, 255, 255, 0.07);
        color: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.18);
        transition: background 0.2s;
        cursor: pointer;
      }

      html.light-mode .glass-btn-secondary {
        background: rgba(99, 102, 241, 0.08);
        color: rgb(55, 65, 81);
        border: 1px solid rgba(99, 102, 241, 0.25);
      }

      .glass-btn-secondary:hover { background: rgba(255, 255, 255, 0.14); }
      html.light-mode .glass-btn-secondary:hover { background: rgba(99, 102, 241, 0.16); }

      .glass-btn-info {
        background: rgba(99, 102, 241, 0.18);
        color: rgba(165, 180, 252, 1);
        border: 1px solid rgba(99, 102, 241, 0.32);
        transition: background 0.2s;
        cursor: pointer;
      }

      html.light-mode .glass-btn-info {
        background: rgba(99, 102, 241, 0.12);
        color: rgb(55, 65, 81);
        border: 1px solid rgba(99, 102, 241, 0.3);
      }

      .glass-btn-info:hover { background: rgba(99, 102, 241, 0.32); }
      html.light-mode .glass-btn-info:hover { background: rgba(99, 102, 241, 0.22); }

      .glass-btn-danger {
        background: rgba(239, 68, 68, 0.16);
        color: rgba(252, 165, 165, 1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        transition: background 0.2s;
        cursor: pointer;
      }

      html.light-mode .glass-btn-danger {
        background: rgba(239, 68, 68, 0.12);
        color: rgb(127, 29, 29);
        border: 1px solid rgba(239, 68, 68, 0.3);
      }

      .glass-btn-danger:hover { background: rgba(239, 68, 68, 0.3); }
      html.light-mode .glass-btn-danger:hover { background: rgba(239, 68, 68, 0.22); }

      /* ── Datetime-local input calendar icon tint ─────────── */
      input[type="datetime-local"],
      input[type="date"] {
        color-scheme: dark;
      }

      html.light-mode input[type="datetime-local"],
      html.light-mode input[type="date"] {
        color-scheme: light;
      }

      /* ── Custom scrollbar ─────────────────────────────────── */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.04); }
      ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.22); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.36); }

      html.light-mode ::-webkit-scrollbar-track { background: rgba(99, 102, 241, 0.08); }
      html.light-mode ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.4); }
      html.light-mode ::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.6); }

      /* ── Theme toggle button ──────────────────────────────── */
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        z-index: 100;
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.3s, transform 0.1s, color 0.3s;
        font-size: 1.2rem;
      }

      html.light-mode .theme-toggle {
        background: rgba(99, 102, 241, 0.15);
        border: 1px solid rgba(99, 102, 241, 0.3);
        color: rgb(55, 65, 81);
      }

      .theme-toggle:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.1);
      }

      html.light-mode .theme-toggle:hover {
        background: rgba(99, 102, 241, 0.25);
      }
    </style>
</head>
<body class="min-h-screen text-white transition-colors duration-300">
    <!-- Theme Toggle Button -->
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light mode" title="Toggle theme (Press D)">
      ☀️
    </button>

    <nav class="glass sticky top-0 z-40 border-b border-white/10">
        <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4">
            <h1 class="text-xl font-bold tracking-wide drop-shadow">✦ {{ t('app.name') }}</h1>
            <div class="flex items-center gap-2">
                <!-- Language Switcher -->
                <div class="relative inline-block group">
                    <button id="locale-switcher" class="glass-btn-secondary rounded-xl px-3 py-1.5 text-sm font-medium flex items-center gap-1" title="Switch language">
                        {% if locale == 'en' %}
                            🇬🇧 English
                        {% else %}
                            🇵🇱 Polski
                        {% endif %}
                    </button>
                    <div class="absolute right-0 mt-1 hidden w-32 rounded-lg bg-black/80 border border-white/20 py-1 shadow-lg group-hover:block">
                        <button type="button" onclick="switchLocale('pl')" class="w-full text-left px-4 py-1.5 hover:bg-white/10 text-sm">
                            🇵🇱 Polski
                        </button>
                        <button type="button" onclick="switchLocale('en')" class="w-full text-left px-4 py-1.5 hover:bg-white/10 text-sm">
                            🇬🇧 English
                        </button>
                    </div>
                </div>
                
                <!-- Logout -->
                <form method="post" action="/auth/logout" class="inline">
                    <button type="submit" class="glass-btn-secondary rounded-xl px-4 py-2 text-sm font-medium">{{ t('nav.logout') }}</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="mx-auto max-w-7xl px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <script>
      // ── Language switcher ──────────────────────────────────────
      function switchLocale(locale) {
        // Write to localStorage for unauthenticated users
        localStorage.setItem('locale', locale);
        
        // Reload page with ?lang=xx query param
        // Server-side resolve_locale() will read it, set cookie, and render page
        const url = new URL(window.location);
        url.searchParams.set('lang', locale);
        window.location.href = url.toString();
      }

      // ── Theme persistence ────────────────────────────────────
      const htmlRoot = document.getElementById('html-root');
      const themeToggle = document.getElementById('theme-toggle');

      // Initialize theme from localStorage or system preference
      function initTheme() {
        const stored = localStorage.getItem('theme');
        if (stored) {
          if (stored === 'light') htmlRoot.classList.add('light-mode');
          updateToggleIcon();
          return;
        }
        
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (!prefersDark) {
          htmlRoot.classList.add('light-mode');
        }
        updateToggleIcon();
      }

      function updateToggleIcon() {
        const isLight = htmlRoot.classList.contains('light-mode');
        themeToggle.textContent = isLight ? '🌙' : '☀️';
        document.body.style.color = isLight ? '#1e3a8a' : 'white';
      }

      themeToggle.addEventListener('click', () => {
        htmlRoot.classList.toggle('light-mode');
        const isLight = htmlRoot.classList.contains('light-mode');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        updateToggleIcon();
      });

      // Keyboard shortcut: D key toggles theme
      document.addEventListener('keydown', (e) => {
        if (e.key === 'd' || e.key === 'D') {
          if (!['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
            themeToggle.click();
          }
        }
      });

      initTheme();
    </script>
</body>
</html>
