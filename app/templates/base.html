<!DOCTYPE html>
<html lang="{{ locale|default('pl') }}" id="html-root">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ t('app.name') }}{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="min-h-screen text-white transition-colors duration-300">
    <!-- Theme Toggle Button -->
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light mode" title="Toggle theme (Press D)">
      ☀️
    </button>

    <nav class="glass sticky top-0 z-40 border-b border-white/10">
        <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4">
            <h1 class="text-xl font-bold tracking-wide drop-shadow">✦ {{ t('app.name') }}</h1>
            <a href="/budget/overview" class="glass-btn-secondary rounded-xl px-3 py-1.5 text-sm font-medium">{{ t('budget.nav_link') }}</a>
            <div class="flex items-center gap-2">
                <!-- Language Switcher -->
                <div class="relative inline-block group">
                    <button id="locale-switcher" class="glass-btn-secondary rounded-xl px-3 py-1.5 text-sm font-medium flex items-center gap-1" title="Switch language">
                        {% if locale == 'en' %}
                            🇬🇧 English
                        {% else %}
                            🇵🇱 Polski
                        {% endif %}
                    </button>
                    <div class="absolute right-0 hidden pt-1 w-32 group-hover:block">
                        <div class="rounded-lg bg-black/80 border border-white/20 py-1 shadow-lg">
                            <button type="button" onclick="switchLocale('pl')" class="w-full text-left px-4 py-1.5 hover:bg-white/10 text-sm">
                                🇵🇱 Polski
                            </button>
                            <button type="button" onclick="switchLocale('en')" class="w-full text-left px-4 py-1.5 hover:bg-white/10 text-sm">
                                🇬🇧 English
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Logout -->
                <form method="post" action="/auth/logout" class="inline">
                    <button type="submit" class="glass-btn-secondary rounded-xl px-4 py-2 text-sm font-medium">{{ t('nav.logout') }}</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="mx-auto max-w-7xl px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <script>
      // ── Language switcher ──────────────────────────────────────
      function switchLocale(locale) {
        // Write to localStorage for unauthenticated users
        localStorage.setItem('locale', locale);
        
        // Reload page with ?lang=xx query param
        // Server-side resolve_locale() will read it, set cookie, and render page
        const url = new URL(window.location);
        url.searchParams.set('lang', locale);
        window.location.href = url.toString();
      }

      // ── Theme persistence ────────────────────────────────────
      const htmlRoot = document.getElementById('html-root');
      const themeToggle = document.getElementById('theme-toggle');

      // Initialize theme from localStorage or system preference
      function initTheme() {
        const stored = localStorage.getItem('theme');
        if (stored) {
          if (stored === 'light') htmlRoot.classList.add('light-mode');
          updateToggleIcon();
          return;
        }
        
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (!prefersDark) {
          htmlRoot.classList.add('light-mode');
        }
        updateToggleIcon();
      }

      function updateToggleIcon() {
        const isLight = htmlRoot.classList.contains('light-mode');
        themeToggle.textContent = isLight ? '🌙' : '☀️';
        document.body.style.color = isLight ? '#1e3a8a' : 'white';
      }

      themeToggle.addEventListener('click', () => {
        htmlRoot.classList.toggle('light-mode');
        const isLight = htmlRoot.classList.contains('light-mode');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        updateToggleIcon();
      });

      // Keyboard shortcut: D key toggles theme
      document.addEventListener('keydown', (e) => {
        if (e.key === 'd' || e.key === 'D') {
          if (!['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
            themeToggle.click();
          }
        }
      });

      initTheme();
    </script>
</body>
</html>
