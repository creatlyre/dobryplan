<!-- Manual Event Entry Modal -->
<div id="event-entry-modal"
     class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 px-3 py-3 backdrop-blur-sm"
     role="dialog"
     aria-modal="true"
     aria-labelledby="event-entry-title">
  <div id="event-entry-panel"
       class="glass relative w-full max-w-2xl max-h-[92vh] overflow-y-auto rounded-2xl p-5 sm:p-6">
    <div class="mb-4 flex items-start justify-between">
      <div>
        <h2 id="event-entry-title" class="text-lg font-semibold text-white">{{ t('calendar.add_event') }}</h2>
        <p class="mt-1 text-xs text-white/60">{{ t('event_entry.manual_help') }}</p>
      </div>
      <button id="event-entry-close-btn"
              type="button"
              class="glass-btn-secondary min-h-[44px] min-w-[44px] rounded-xl px-3 py-2 text-sm"
                aria-label="{{ t('qa.close_modal') }}">
              {{ t('qa.close') }}
      </button>
    </div>

    <form id="event-entry-form" class="space-y-3" novalidate>
      <input id="event-entry-id" type="hidden" />

      <div>
        <label for="event-entry-title-input" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('qa.title') }}</label>
        <input id="event-entry-title-input" class="glass-input" maxlength="200" required />
        <p id="event-entry-title-error" class="mt-1 hidden text-xs text-red-300">{{ t('event_entry.valid_title') }}</p>
      </div>

      <div>
        <label for="event-entry-description" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('event_entry.description') }}</label>
        <textarea id="event-entry-description" class="glass-input" rows="2" style="resize:vertical"></textarea>
      </div>

      <div>
        <label for="event-entry-visibility" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('qa.visibility') }}</label>
        <select id="event-entry-visibility" class="glass-input">
          <option value="shared">{{ t('qa.visibility_shared') }}</option>
          <option value="private">{{ t('qa.visibility_private') }}</option>
        </select>
        <p class="mt-1 text-xs text-white/40">{{ t('qa.visibility_help') }}</p>
      </div>

      <div class="grid grid-cols-1 gap-2 sm:grid-cols-3">
        <div>
          <label for="event-entry-start-date" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('event_entry.start_date') }}</label>
          <input id="event-entry-start-date" type="date" class="glass-input" required />
          <p id="event-entry-date-lock-note" class="mt-1 hidden text-xs text-cyan-200">{{ t('event_entry.date_locked') }}</p>
          <p id="event-entry-start-date-error" class="mt-1 hidden text-xs text-red-300">{{ t('event_entry.choose_start_date') }}</p>
        </div>
        <div>
          <label for="event-entry-start-time" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('event_entry.start_time') }}</label>
          <input id="event-entry-start-time" type="time" step="1800" class="glass-input" required />
          <p id="event-entry-start-time-error" class="mt-1 hidden text-xs text-red-300">{{ t('event_entry.choose_start_time') }}</p>
        </div>
        <div>
          <label for="event-entry-end-time" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('event_entry.end_time') }}</label>
          <input id="event-entry-end-time" type="time" step="1800" class="glass-input" />
          <p id="event-entry-end-time-error" class="mt-1 hidden text-xs text-red-300">{{ t('event_entry.end_adjusted') }}</p>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-2 sm:grid-cols-3">
        <div>
          <label for="event-entry-repeat" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('qa.repeat') }}</label>
          <select id="event-entry-repeat" class="glass-input">
            <option value="">{{ t('qa.no_repeat') }}</option>
            <option value="DAILY">{{ t('qa.repeat_daily') }}</option>
            <option value="WEEKLY">{{ t('qa.repeat_weekly') }}</option>
            <option value="MONTHLY">{{ t('qa.repeat_monthly') }}</option>
            <option value="YEARLY">{{ t('qa.repeat_yearly') }}</option>
          </select>
        </div>
        <div>
          <label for="event-entry-repeat-count" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('event_entry.repeat_count') }}</label>
          <input id="event-entry-repeat-count" type="number" min="1" class="glass-input" />
        </div>
        <div>
          <label for="event-entry-repeat-until" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('qa.repeat_until') }}</label>
          <input id="event-entry-repeat-until" type="date" class="glass-input" />
        </div>
      </div>

      <p id="event-entry-save-error" class="hidden rounded-xl border border-red-400/30 bg-red-900/20 px-3 py-2 text-xs text-red-300" role="alert"></p>

      <div class="flex flex-wrap gap-2">
        <button id="event-entry-save-btn" type="submit" class="glass-btn-primary min-h-[44px] rounded-xl px-4 py-2 text-sm font-medium" disabled>{{ t('qa.save_event') }}</button>
        <button id="event-entry-save-another-btn" type="button" class="glass-btn-secondary min-h-[44px] rounded-xl px-4 py-2 text-sm" disabled>{{ t('qa.save_add_another') }}</button>
        <button id="event-entry-cancel-btn" type="button" class="glass-btn-secondary min-h-[44px] rounded-xl px-4 py-2 text-sm">{{ t('qa.cancel') }}</button>
      </div>
    </form>
  </div>
</div>

<style>
  @media (max-width: 640px) {
    #event-entry-modal {
      padding: 0;
    }

    #event-entry-panel {
      border-radius: 0;
      max-height: 100vh;
      min-height: 100vh;
      max-width: 100%;
      padding-bottom: 1.5rem;
    }
  }
</style>
