<!-- Manual Event Entry Modal -->
<div id="event-entry-modal"
     class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 px-3 py-3 backdrop-blur-sm"
     role="dialog"
     aria-modal="true"
     aria-labelledby="event-entry-title">
  <div id="event-entry-panel"
       class="glass relative w-full max-w-2xl max-h-[92vh] overflow-y-auto rounded-2xl p-5 sm:p-6">
    <div class="mb-4 flex items-start justify-between">
      <div>
        <h2 id="event-entry-title" class="text-lg font-semibold text-white">Add Event</h2>
        <p class="mt-1 text-xs text-white/60">Manual event entry with date and time pickers.</p>
      </div>
      <button id="event-entry-close-btn"
              type="button"
              class="glass-btn-secondary min-h-[44px] min-w-[44px] rounded-xl px-3 py-2 text-sm"
              aria-label="Close event entry modal">
        Close
      </button>
    </div>

    <form id="event-entry-form" class="space-y-3" novalidate>
      <input id="event-entry-id" type="hidden" />

      <div>
        <label for="event-entry-title-input" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">Title</label>
        <input id="event-entry-title-input" class="glass-input" maxlength="200" required />
        <p id="event-entry-title-error" class="mt-1 hidden text-xs text-red-300">Enter a valid title.</p>
      </div>

      <div>
        <label for="event-entry-description" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">Description</label>
        <textarea id="event-entry-description" class="glass-input" rows="2" style="resize:vertical"></textarea>
      </div>

      <div>
        <label for="event-entry-visibility" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">Visibility</label>
        <select id="event-entry-visibility" class="glass-input">
          <option value="shared">Shared (household)</option>
          <option value="private">Private (only me)</option>
        </select>
        <p class="mt-1 text-xs text-white/40">Shared events appear for all household members. Private events are only visible to you.</p>
      </div>

      <div class="grid grid-cols-1 gap-2 sm:grid-cols-3">
        <div>
          <label for="event-entry-start-date" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">Start Date</label>
          <input id="event-entry-start-date" type="date" class="glass-input" required />
          <p id="event-entry-date-lock-note" class="mt-1 hidden text-xs text-cyan-200">Date locked to selected calendar day.</p>
          <p id="event-entry-start-date-error" class="mt-1 hidden text-xs text-red-300">Choose a start date.</p>
        </div>
        <div>
          <label for="event-entry-start-time" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">Start Time</label>
          <input id="event-entry-start-time" type="time" step="1800" class="glass-input" required />
          <p id="event-entry-start-time-error" class="mt-1 hidden text-xs text-red-300">Choose a start time.</p>
        </div>
        <div>
          <label for="event-entry-end-time" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">End Time (optional)</label>
          <input id="event-entry-end-time" type="time" step="1800" class="glass-input" />
          <p id="event-entry-end-time-error" class="mt-1 hidden text-xs text-red-300">End time adjusted automatically.</p>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-2 sm:grid-cols-3">
        <div>
          <label for="event-entry-repeat" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">Repeat</label>
          <select id="event-entry-repeat" class="glass-input">
            <option value="">No repeat</option>
            <option value="DAILY">Daily</option>
            <option value="WEEKLY">Weekly</option>
            <option value="MONTHLY">Monthly</option>
            <option value="YEARLY">Yearly</option>
          </select>
        </div>
        <div>
          <label for="event-entry-repeat-count" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">Repeat count</label>
          <input id="event-entry-repeat-count" type="number" min="1" class="glass-input" />
        </div>
        <div>
          <label for="event-entry-repeat-until" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">Repeat until</label>
          <input id="event-entry-repeat-until" type="date" class="glass-input" />
        </div>
      </div>

      <p id="event-entry-save-error" class="hidden rounded-xl border border-red-400/30 bg-red-900/20 px-3 py-2 text-xs text-red-300" role="alert"></p>

      <div class="flex flex-wrap gap-2">
        <button id="event-entry-save-btn" type="submit" class="glass-btn-primary min-h-[44px] rounded-xl px-4 py-2 text-sm font-medium" disabled>Save Event</button>
        <button id="event-entry-save-another-btn" type="button" class="glass-btn-secondary min-h-[44px] rounded-xl px-4 py-2 text-sm" disabled>Save &amp; Add Another</button>
        <button id="event-entry-cancel-btn" type="button" class="glass-btn-secondary min-h-[44px] rounded-xl px-4 py-2 text-sm">Cancel</button>
      </div>
    </form>
  </div>
</div>

<style>
  @media (max-width: 640px) {
    #event-entry-modal {
      padding: 0;
    }

    #event-entry-panel {
      border-radius: 0;
      max-height: 100vh;
      min-height: 100vh;
      max-width: 100%;
      padding-bottom: 1.5rem;
    }
  }
</style>
