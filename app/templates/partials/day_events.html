<div class="glass rounded-2xl p-4">
    <div class="mb-3 flex items-center justify-between">
        <h3 class="text-lg font-semibold text-white">{{ t('day.upcoming') }}</h3>
        <span class="rounded-full bg-white/10 px-3 py-1 text-xs text-white/60 border border-white/15">{{ date_label }}</span>
    </div>
    {% if events %}
    <ul class="space-y-2">
        {% for event in events %}
        <li class="rounded-xl border border-white/10 bg-white/[0.04] p-3 transition-colors hover:bg-white/[0.08]">
            <div class="flex items-center justify-between">
                <div>
                    <div class="font-medium text-white">{{ event.title }}</div>
                    <div class="text-xs text-white/50 mt-0.5">{{ event.start_at.strftime('%H:%M') }} – {{ event.end_at.strftime('%H:%M') }}</div>
                </div>
                <div class="flex gap-2 ml-2 shrink-0">
                    <button class="glass-btn-info rounded-lg px-2.5 py-1 text-xs font-medium" onclick="prefillEvent('{{ event.id }}', '{{ event.title|e }}', '{{ (event.description or '')|e }}', '{{ event.start_at.strftime('%Y-%m-%dT%H:%M') }}', '{{ event.end_at.strftime('%Y-%m-%dT%H:%M') }}', '{{ event.visibility|default("shared") }}')">{{ t('day.edit') }}</button>
                    <button class="glass-btn-danger rounded-lg px-2.5 py-1 text-xs font-medium" onclick="deleteEvent('{{ event.id }}')">{{ t('day.delete') }}</button>
                </div>
            </div>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p class="text-sm text-white/40">{{ t('day.none') }}</p>
    {% endif %}
</div>
