<!-- Fallback Form: Manual event entry after 2+ failed parse attempts -->
<div id="qa-fallback-phase" class="hidden px-6 py-4">
  <div class="mb-4">
    <h3 class="font-medium text-white">{{ t('qa.manual_entry') }}</h3>
    <p class="text-xs text-white/60 mt-1">
      {{ t('qa.manual_announce') }}
    </p>
    <div class="mt-3 p-3 bg-white/5 rounded-xl border border-white/15">
      <p class="font-mono text-xs text-white/70">
        <span id="qa-fallback-original-text"></span>
      </p>
    </div>
  </div>

  <div class="space-y-3">
    <!-- Title -->
    <div>
      <label for="qa-fallback-title" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">
        {{ t('qa.title') }} <span class="text-red-400">*</span>
      </label>
      <input 
        id="qa-fallback-title" 
        type="text" 
        class="glass-input" 
        placeholder="{{ t('qa.placeholder') }}"
        required
      />
    </div>

    <!-- Start / End datetime -->
    <div class="grid grid-cols-2 gap-2">
      <div>
        <label for="qa-fallback-start" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">
          {{ t('qa.start') }} <span class="text-red-400">*</span>
        </label>
        <input 
          id="qa-fallback-start" 
          type="datetime-local" 
          class="glass-input"
          required
        />
      </div>
      <div>
        <label for="qa-fallback-end" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">
          {{ t('qa.end') }} <span class="text-red-400">*</span>
        </label>
        <input 
          id="qa-fallback-end" 
          type="datetime-local" 
          class="glass-input"
          required
        />
      </div>
    </div>

    <!-- Description -->
    <div>
      <label for="qa-fallback-description" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">
        {{ t('event_entry.description') }}
      </label>
      <textarea 
        id="qa-fallback-description" 
        class="glass-input"
        rows="2"
        style="resize:vertical"
      ></textarea>
    </div>

    <!-- Repeat / Count -->
    <div class="grid grid-cols-2 gap-2">
      <div>
        <label for="qa-fallback-repeat" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">
          {{ t('qa.repeat') }}
        </label>
        <select 
          id="qa-fallback-repeat" 
          class="glass-input"
        >
          <option value="">{{ t('qa.no_repeat') }}</option>
          <option value="DAILY">{{ t('qa.repeat_daily') }}</option>
          <option value="WEEKLY">{{ t('qa.repeat_weekly') }}</option>
          <option value="MONTHLY">{{ t('qa.repeat_monthly') }}</option>
          <option value="YEARLY">{{ t('qa.repeat_yearly') }}</option>
        </select>
      </div>
      <div>
        <label for="qa-fallback-count" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">
          {{ t('qa.count') }}
        </label>
        <input 
          id="qa-fallback-count" 
          type="number" 
          min="1" 
          placeholder="optional"
          class="glass-input"
        />
      </div>
    </div>

    <!-- Until -->
    <div>
      <label for="qa-fallback-until" class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">
        {{ t('qa.repeat_until') }}
      </label>
      <input 
        id="qa-fallback-until" 
        type="date" 
        class="glass-input"
      />
    </div>

    <!-- Action buttons -->
    <div class="mt-4 flex gap-2">
      <button 
        id="qa-fallback-save-btn" 
        type="button"
        class="flex-1 glass-btn-primary rounded-xl px-4 py-2 text-sm font-medium disabled:opacity-50"
      >
        {{ t('qa.save_event') }}
      </button>
      <button 
        type="button" 
        id="qa-fallback-cancel-btn" 
        class="flex-1 glass-btn-secondary rounded-xl px-4 py-2 text-sm"
      >
        {{ t('qa.cancel') }}
      </button>
    </div>
  </div>
</div>
