<form id="event-form" class="space-y-3" onsubmit="return submitEventForm(event)">
    <input id="event-id" type="hidden" />
    <div>
        <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('qa.title') }}</label>
        <input id="event-title" required class="glass-input" />
    </div>
    <div>
        <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('event_entry.description') }}</label>
        <textarea id="event-description" class="glass-input" rows="2" style="resize:vertical"></textarea>
    </div>
    <div class="grid grid-cols-2 gap-2">
        <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('qa.start') }}</label>
            <input id="event-start" type="datetime-local" required class="glass-input" />
        </div>
        <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('qa.end') }}</label>
            <input id="event-end" type="datetime-local" required class="glass-input" />
        </div>
    </div>
    <div class="grid grid-cols-2 gap-2">
        <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('qa.repeat') }}</label>
            <select id="event-repeat" class="glass-input">
                <option value="">{{ t('qa.no_repeat') }}</option>
                <option value="DAILY">{{ t('qa.repeat_daily') }}</option>
                <option value="WEEKLY">{{ t('qa.repeat_weekly') }}</option>
                <option value="MONTHLY">{{ t('qa.repeat_monthly') }}</option>
                <option value="YEARLY">{{ t('qa.repeat_yearly') }}</option>
            </select>
        </div>
        <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('event_entry.repeat_count') }}</label>
            <input id="event-repeat-count" type="number" min="1" class="glass-input" placeholder="e.g. 10" />
        </div>
    </div>
    <div>
        <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('qa.repeat_until') }}</label>
        <input id="event-repeat-until" type="date" class="glass-input" />
    </div>
    <div>
        <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('qa.visibility') }}</label>
        <select id="event-visibility" class="glass-input">
            <option value="shared">{{ t('qa.visibility_shared') }}</option>
            <option value="private">{{ t('qa.visibility_private') }}</option>
        </select>
        <p class="mt-1 text-xs text-white/40">{{ t('qa.visibility_help') }}</p>
    </div>
    <div>
        <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('category.label') }}</label>
        <select id="event-category" class="glass-input">
            <option value="">{{ t('category.none') }}</option>
        </select>
    </div>
    <!-- Reminders Section -->
    <div id="event-reminders-section">
        <div class="flex items-center justify-between mb-2">
            <label class="block text-xs font-medium uppercase tracking-wide text-white/60">{{ t('reminder.label') }}</label>
            <label class="flex items-center gap-2 cursor-pointer">
                <input id="event-reminders-toggle" type="checkbox" checked
                       class="h-4 w-4 rounded border-white/30 bg-white/10 text-indigo-500 focus:ring-indigo-500/50" />
                <span id="event-reminders-toggle-label" class="text-xs text-white/60">{{ t('reminder.toggle_on') }}</span>
            </label>
        </div>
        <div id="event-reminders-container">
            <div id="event-reminder-chips" class="flex flex-wrap gap-2 mb-2"></div>
            <div id="event-reminder-add-row" class="hidden items-center gap-2 mb-2">
                <input id="event-reminder-minutes-input" type="number" min="0" max="40320"
                       placeholder="{{ t('reminder.minutes_placeholder') }}"
                       class="glass-input w-28 text-sm" />
                <select id="event-reminder-method-select" class="glass-input w-28 text-sm">
                    <option value="popup">{{ t('reminder.method_popup') }}</option>
                    <option value="email">{{ t('reminder.method_email') }}</option>
                </select>
                <button type="button" id="event-reminder-confirm-btn"
                        class="glass-btn-primary rounded-lg px-3 py-1.5 text-xs min-h-[32px]">OK</button>
            </div>
            <div class="flex items-center gap-3">
                <button type="button" id="event-reminder-add-btn"
                        class="text-xs text-cyan-300 hover:text-cyan-200 transition-colors">{{ t('reminder.add') }}</button>
                <span id="event-reminder-counter" class="text-xs text-white/40 hidden">{{ t('reminder.max_reached') }}</span>
            </div>
            <p class="mt-1 text-xs text-white/40">{{ t('reminder.sync_help') }}</p>
        </div>
    </div>
    <div class="flex flex-wrap gap-2">
        <button type="submit" class="glass-btn-primary rounded-xl px-4 py-2.5 text-sm font-medium min-h-[44px]">{{ t('qa.save_event') }}</button>
        <button type="button" class="glass-btn-secondary rounded-xl px-4 py-2.5 text-sm min-h-[44px]" onclick="resetEventForm()">{{ t('event_form.reset') }}</button>
    </div>
</form>
