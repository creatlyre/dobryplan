{% extends "base.html" %}

{% block title %}{{ t('app.invite_title') }}{% endblock %}

{% block content %}
<div class="mx-auto max-w-md glass rounded-2xl p-8">
  <a href="/calendar"
     class="glass-btn-secondary mb-4 inline-flex min-h-[44px] items-center rounded-xl px-4 py-2 text-sm font-medium focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cyan-300 focus-visible:ring-offset-2 focus-visible:ring-offset-transparent">
    &larr; {{ t('invite.back') }}
  </a>

    <h2 class="mb-6 text-2xl font-bold text-white">{{ t('invite.title') }}</h2>

    <form id="invite-form" class="space-y-5">
        <div>
            <label for="email" class="block text-sm font-medium text-white/70">{{ t('invite.email') }}</label>
            <input id="email" name="email" type="email" required placeholder="{{ t('invite.placeholder') }}" class="glass-input mt-2">
        </div>

          <button type="submit" class="glass-btn-primary w-full rounded-xl py-2.5 text-sm font-medium">{{ t('invite.send') }}</button>
    </form>

    <div id="message" class="mt-4 hidden rounded-xl p-3 text-sm border"></div>
</div>

<script>
document.getElementById('invite-form').addEventListener('submit', async (event) => {
  event.preventDefault();
  const email = document.getElementById('email').value;

  const response = await fetch('/api/users/invite', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email })
  });

  const data = await response.json();
  const message = document.getElementById('message');
  message.classList.remove('hidden');

  if (response.ok) {
    message.className = 'mt-4 rounded-xl p-3 text-sm text-green-300 bg-green-500/10 border border-green-400/30';
    message.textContent = data.message;
    document.getElementById('email').value = '';
  } else {
    message.className = 'mt-4 rounded-xl p-3 text-sm text-red-300 bg-red-500/10 border border-red-400/30';
    message.textContent = data.detail || '{{ t("invite.failed") }}';
  }
});
</script>
{% endblock %}
