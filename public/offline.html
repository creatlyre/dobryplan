<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1e1553">
    <title>Synco — Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f0a2e;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            text-align: center;
            padding: 24px;
        }
        .logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #fff;
            margin-bottom: 2rem;
        }
        .logo svg {
            width: 28px;
            height: 28px;
            vertical-align: -4px;
            margin-right: 4px;
        }
        .icon {
            width: 64px;
            height: 64px;
            margin-bottom: 1.5rem;
            opacity: 0.6;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
        }
        p {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 0.25rem;
            line-height: 1.5;
        }
        .retry {
            display: inline-block;
            margin-top: 2rem;
            padding: 12px 32px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .retry:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="logo">
        <img src="/static/icons/logo.svg" alt="Synco" style="width:48px;height:48px;">
        Synco
    </div>
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1"/>
    </svg>
    <h1>Brak po&#322;&#261;czenia</h1>
    <p>Nie mo&#380;na po&#322;&#261;czy&#263; si&#281; z serwerem.</p>
    <p style="color:#64748b;font-size:0.875rem;">You're offline. Check your connection and try again.</p>
    <button class="retry" onclick="location.reload()">Spr&#243;buj ponownie</button>
</body>
</html>
