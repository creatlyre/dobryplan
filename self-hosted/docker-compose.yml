version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - ENVIRONMENT=self-hosted
      - SUPABASE_URL=http://rest:3000
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
    restart: unless-stopped
    networks:
      - synco-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: supabase/postgres:15.8.1.80
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: synco
    volumes:
      - synco-db:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - synco-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rest:
    image: postgrest/postgrest:v12.2.3
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/synco
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - synco-net

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - synco-net

volumes:
  synco-db:
  caddy-data:
  caddy-config:

networks:
  synco-net:
    driver: bridge
