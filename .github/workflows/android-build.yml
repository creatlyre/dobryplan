# Build Android APK (TWA wrapper) via Bubblewrap
#
# Required GitHub Secrets:
#   KEYSTORE_BASE64    — base64-encoded android/dobryplan-keystore.jks
#   KEYSTORE_PASSWORD  — keystore password
#   KEY_PASSWORD       — signing key password

name: Build Android APK

on:
  push:
    branches: [master]
    paths:
      - 'android/**'
      - 'public/manifest.json'
      - 'public/sw.js'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap JDK and SDK paths
        run: |
          mkdir -p "$HOME/.bubblewrap"
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_HOME" > "$HOME/.bubblewrap/config.json"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/dobryplan-keystore.jks

      - name: Extract version from pyproject.toml
        run: |
          APP_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          VERSION_CODE=$(echo "$APP_VERSION" | awk -F. '{printf "%d%02d%02d", $1, $2, $3}')
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Update twa-manifest.json with version
        run: |
          cd android
          jq --arg v "$APP_VERSION" --argjson vc "$VERSION_CODE" \
            '.appVersion = $v | .appVersionCode = $vc' \
            twa-manifest.json > twa-manifest-updated.json
          mv twa-manifest-updated.json twa-manifest.json

      - name: Build APK with Bubblewrap
        run: |
          cd android
          sudo apt-get install -y expect > /dev/null 2>&1
          # Step 1: Generate/update the Android project (gradle wrapper, build files)
          expect -c '
            set timeout 120
            spawn bubblewrap update --appVersionName "$env(APP_VERSION)"
            expect {
              "*(Y/n)*" { send "Y\r"; exp_continue }
              eof
            }
          '
          # Step 2: Build the APK with signing
          expect -c '
            set timeout 600
            spawn bubblewrap build --skipPwaValidation
            expect {
              "*(Y/n)*" { send "n\r"; exp_continue }
              "*Key Store*" { send "$env(KEYSTORE_PASSWORD)\r"; exp_continue }
              "*Password for the Key:*" { send "$env(KEY_PASSWORD)\r"; exp_continue }
              eof
            }
            catch wait result
            exit [lindex $result 3]
          '
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dobryplan-apk
          path: android/app-release-signed.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ env.APP_VERSION }}
          name: Dobry Plan Android v${{ env.APP_VERSION }}
          body: |
            Android APK build from commit ${{ github.sha }}
            Version: ${{ env.APP_VERSION }} (code: ${{ env.VERSION_CODE }})

            Install: Download dobryplan.apk and sideload on your Android device.
          files: android/app-release-signed.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
